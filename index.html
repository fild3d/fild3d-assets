<!DOCTYPE html>
<html lang="pt-BR" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Objeto 3D Interativo — FILD 3D</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0C0819;
    font-family: 'Segoe UI', Calibri, sans-serif;
    height: 100%;
  }
  #canvas-container { width: 100vw; height: 100vh; display: block; }
  #info {
    position: absolute;
    top: 18px;
    left: 18px;
    color: #e8d8c8;
    background: rgba(12, 8, 25, 0.55);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(180, 110, 70, 0.35);
    border-radius: 12px;
    padding: 14px 18px;
    max-width: 280px;
    font-size: 13px;
    line-height: 1.5;
  }
  #info h1 {
    margin: 0 0 6px 0;
    font-family: Georgia, serif;
    font-size: 17px;
    color: #c97a4a;
    letter-spacing: 0.5px;
  }
  #info .hint { color: #8f8a9c; font-size: 11.5px; margin-top: 8px; }
  #controls {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    background: rgba(12, 8, 25, 0.55);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(180, 110, 70, 0.35);
    border-radius: 30px;
    padding: 8px 12px;
  }
  #controls button {
    background: linear-gradient(135deg, #c97a4a, #8f4a28);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 12.5px;
    cursor: pointer;
    transition: transform 0.15s, filter 0.15s;
  }
  #controls button:hover { transform: translateY(-2px); filter: brightness(1.15); }
  #controls button.active { background: linear-gradient(135deg, #4601FA, #7a3aff); }
</style>

<mso:_ApprovalStatus msdt:dt="string">0</mso:_ApprovalStatus>

<mso:_ApprovalRespondedBy msdt:dt="string"></mso:_ApprovalRespondedBy>
</mso:CustomDocumentProperties>

</head>
<body>
<div id="canvas-container"></div>
<div id="info">
  <h1>Vespa-Oleira</h1>
  Uma esfera de argila esculpida — geometria icosaédrica facetada, em referência ao ninho da <em>Zeta argillaceum</em> e ao seu trabalho de modelagem manual.
  <div class="hint">🖱️ Arraste para girar · Scroll para zoom · Toque e arraste no celular</div>
</div>
<div id="controls">
  <button id="btn-rotate" class="active">Auto-girar</button>
  <button id="btn-wire">Wireframe</button>
  <button id="btn-material">Material</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const container = document.getElementById('canvas-container');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0C0819);
scene.fog = new THREE.FogExp2(0x0C0819, 0.035);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// ---- Geometry: faceted icosahedron (clay-pot vibe) ----
const geo = new THREE.IcosahedronGeometry(1.8, 1);

const clayMaterial = new THREE.MeshStandardMaterial({
  color: 0xb5663a,
  roughness: 0.55,
  metalness: 0.15,
  flatShading: true
});

const purpleMaterial = new THREE.MeshStandardMaterial({
  color: 0x4601FA,
  roughness: 0.25,
  metalness: 0.7,
  flatShading: true,
  emissive: 0x1a0a4a,
  emissiveIntensity: 0.4
});

const mesh = new THREE.Mesh(geo, clayMaterial);
scene.add(mesh);

// Wireframe overlay
const wireGeo = new THREE.WireframeGeometry(geo);
const wireMat = new THREE.LineBasicMaterial({ color: 0xe8d8c8, transparent: true, opacity: 0.25 });
const wireframe = new THREE.LineSegments(wireGeo, wireMat);
mesh.add(wireframe);
wireframe.visible = false;

// ---- Floating particles (kiln sparks) ----
const pGeo = new THREE.BufferGeometry();
const pCount = 400;
const positions = new Float32Array(pCount * 3);
for (let i = 0; i < pCount * 3; i++) positions[i] = (Math.random() - 0.5) * 18;
pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const pMat = new THREE.PointsMaterial({ color: 0xc97a4a, size: 0.04, transparent: true, opacity: 0.6 });
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

// ---- Lighting ----
const amb = new THREE.AmbientLight(0x404060, 0.6);
scene.add(amb);
const key = new THREE.DirectionalLight(0xfff0e0, 1.4);
key.position.set(5, 6, 4);
scene.add(key);
const rim = new THREE.PointLight(0x4601FA, 2, 20);
rim.position.set(-4, -2, -3);
scene.add(rim);
const cyan = new THREE.PointLight(0x00d4ff, 1.2, 15);
cyan.position.set(3, -4, 2);
scene.add(cyan);

// ---- Controls (manual orbit, no OrbitControls in r128) ----
let isDragging = false;
let prevX = 0, prevY = 0;
let rotVelX = 0, rotVelY = 0;
let autoRotate = true;

function onDown(x, y) { isDragging = true; prevX = x; prevY = y; }
function onMove(x, y) {
  if (!isDragging) return;
  rotVelY = (x - prevX) * 0.005;
  rotVelX = (y - prevY) * 0.005;
  mesh.rotation.y += rotVelY;
  mesh.rotation.x += rotVelX;
  prevX = x; prevY = y;
}
function onUp() { isDragging = false; }

renderer.domElement.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
window.addEventListener('mouseup', onUp);
renderer.domElement.addEventListener('touchstart', e => { const t = e.touches[0]; onDown(t.clientX, t.clientY); });
window.addEventListener('touchmove', e => { const t = e.touches[0]; onMove(t.clientX, t.clientY); }, { passive: true });
window.addEventListener('touchend', onUp);

// Zoom
renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  camera.position.z += e.deltaY * 0.003;
  camera.position.z = Math.max(3, Math.min(12, camera.position.z));
}, { passive: false });

// ---- Buttons ----
const btnRotate = document.getElementById('btn-rotate');
const btnWire = document.getElementById('btn-wire');
const btnMaterial = document.getElementById('btn-material');
let materialPurple = false;

btnRotate.addEventListener('click', () => {
  autoRotate = !autoRotate;
  btnRotate.classList.toggle('active', autoRotate);
});
btnWire.addEventListener('click', () => {
  wireframe.visible = !wireframe.visible;
  btnWire.classList.toggle('active', wireframe.visible);
});
btnMaterial.addEventListener('click', () => {
  materialPurple = !materialPurple;
  mesh.material = materialPurple ? purpleMaterial : clayMaterial;
  btnMaterial.classList.toggle('active', materialPurple);
});

// ---- Animate ----
function animate() {
  requestAnimationFrame(animate);
  if (autoRotate && !isDragging) {
    mesh.rotation.y += 0.004;
    mesh.rotation.x += 0.0015;
  }
  if (!isDragging) {
    rotVelX *= 0.95; rotVelY *= 0.95;
    mesh.rotation.x += rotVelX;
    mesh.rotation.y += rotVelY;
  }
  particles.rotation.y += 0.0004;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
